<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Padelleraren Toets</title>

<style>
body { font-family: Arial; margin:0; display:flex; }
#sidebar { width:220px; background:#f0f0f0; padding:15px; }
#main { flex:1; padding:20px; }

button { margin:5px 0; width:100%; }
.question { margin-bottom:15px; }
#timer { font-size:20px; font-weight:bold; color:red; }
.correct { color:green; }
.incorrect { color:red; }
</style>
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar">
<h3>Tests</h3>
<div id="testButtons"></div>

<hr>
<h4>Import / Export</h4>
<button onclick="exportResults()">Download .txt</button>
<input type="file" onchange="importResults(event)">
<p id="importStatus"></p>
</div>

<!-- MAIN -->
<div id="main">

<!-- STUDENT FORM -->
<div id="formDiv">
<h2>Leerlinggegevens</h2>

<label>Naam:<br>
<input type="text" id="studentName"></label><br>

<label>Email:<br>
<input type="email" id="studentEmail"></label><br>

<label>Telefoon:<br>
<input type="tel" id="studentPhone"></label><br>

<label>Geboortedatum:<br>
<input type="date" id="studentDOB"></label><br>

<label>Locatie opleiding:<br>
<input type="text" id="studentLocation"></label><br><br>

<button onclick="startTest()">Start Test</button>
</div>

<!-- TEST -->
<div id="testDiv" style="display:none;">
<h2>Padel Toets</h2>

<p>Naam: <span id="displayName"></span></p>
<p>Test: <span id="displayTest"></span></p>
<p>Datum: <span id="displayDate"></span></p>

<p>Tijd: <span id="timer">50:00</span></p>
<button onclick="pauseTimer()">Pauze / Hervat</button>
<button onclick="stopTest()">Stop Test</button>

<form id="quiz"></form>

<p id="result"></p>
</div>

</div>

<script>

// ================= DATA =================
let studentData = {
  name:"",
  email:"",
  phone:"",
  dob:"",
  location:"",
  results:[]
};

let questions = [];
let currentTest = 1;
let timeLeft = 3000;
let timer;
let paused = false;
let startTime;

// ================= INIT TEST BUTTONS =================
for(let i=1;i<=10;i++){
  let btn = document.createElement("button");
  btn.innerText = "Test " + i;
  btn.onclick = () => selectTest(i);
  document.getElementById("testButtons").appendChild(btn);
}

// ================= SELECT TEST =================
function selectTest(n){
  currentTest = n;
  alert("Geselecteerd: Test " + n);
}

// ================= LOAD JSON =================
function loadJSON(){
  fetch(`padel_test${currentTest}.json`)
  .then(res => res.json())
  .then(data => {
    questions = data['test'+currentTest];
    loadQuiz();
  })
  .catch(err => alert("JSON laden mislukt"));
}

// ================= LOAD QUIZ =================
function loadQuiz(){
  let quiz = document.getElementById("quiz");
  quiz.innerHTML = "";

  questions.forEach((q,i)=>{
    let div = document.createElement("div");
    div.className = "question";

    div.innerHTML = `<p>${i+1}. ${q.question}</p>`;

    q.options.forEach(opt=>{
      div.innerHTML += `
      <label>
      <input type="radio" name="q${i}" value="${opt}"> ${opt}
      </label><br>`;
    });

    quiz.appendChild(div);
  });
}

// ================= START TEST =================
function startTest(){

  studentData.name = document.getElementById('studentName').value;
  studentData.email = document.getElementById('studentEmail').value;
  studentData.phone = document.getElementById('studentPhone').value;
  studentData.dob = document.getElementById('studentDOB').value;
  studentData.location = document.getElementById('studentLocation').value;

  if(!studentData.name){
    alert("Vul naam in");
    return;
  }

  document.getElementById("displayName").innerText = studentData.name;
  document.getElementById("displayTest").innerText = currentTest;
  document.getElementById("displayDate").innerText = new Date().toLocaleString();

  document.getElementById("formDiv").style.display="none";
  document.getElementById("testDiv").style.display="block";

  startTime = new Date();

  loadJSON();
  startTimer();
}

// ================= TIMER =================
function startTimer(){
  timeLeft = 3000;

  timer = setInterval(()=>{
    if(!paused){
      timeLeft--;

      let m = Math.floor(timeLeft/60);
      let s = timeLeft%60;

      document.getElementById("timer").innerText =
        `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;

      if(timeLeft <= 0) stopTest();
    }
  },1000);
}

function pauseTimer(){
  paused = !paused;
}

// ================= STOP TEST =================
function stopTest(){

  clearInterval(timer);

  let correct=0, answered=0;

  questions.forEach((q,i)=>{
    let sel = document.querySelector(`input[name=q${i}]:checked`);
    if(sel){
      answered++;
      if(sel.value === q.correct) correct++;
    }
  });

  let perc = answered ? (correct/answered)*100 : 0;
  let grade = answered ? (correct/answered)*10 : 0;

  let endTime = new Date();

  // opslaan
  studentData.results.push({
    test: currentTest,
    start: startTime.toLocaleString(),
    end: endTime.toLocaleString(),
    answered,
    correct,
    perc: perc.toFixed(1),
    grade: grade.toFixed(1)
  });

  document.getElementById("result").innerHTML =
    `Score: ${correct}/${answered} (${perc.toFixed(1)}%) - Cijfer: ${grade.toFixed(1)}`;
}

// ================= EXPORT =================
function exportResults(){

  const blob = new Blob(
    [JSON.stringify(studentData,null,2)],
    {type:"text/plain"}
  );

  let link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = studentData.name + "_padel.txt";
  link.click();
}

// ================= IMPORT =================
function importResults(event){

  const file = event.target.files[0];
  if(!file) return;

  const reader = new FileReader();

  reader.onload = function(e){

    try{
      studentData = JSON.parse(e.target.result);

      // 👉 formulier invullen
      document.getElementById('studentName').value = studentData.name || "";
      document.getElementById('studentEmail').value = studentData.email || "";
      document.getElementById('studentPhone').value = studentData.phone || "";
      document.getElementById('studentDOB').value = studentData.dob || "";
      document.getElementById('studentLocation').value = studentData.location || "";

      let totaal = studentData.results.length;

      // 👉 laatste test bepalen
      let lastTest = totaal > 0 
        ? studentData.results[totaal-1].test 
        : 1;

      currentTest = lastTest;

      document.getElementById("importStatus").innerText =
        `Welkom terug ${studentData.name}. ${totaal} test(en) geladen. Laatste test: ${lastTest}`;

    }catch(err){
      alert("Import mislukt");
    }

  };

  reader.readAsText(file);
}

</script>

</body>
</html>
