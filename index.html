<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Padel Leraren Toets</title>
<style>
body { font-family: Arial, sans-serif; margin:20px; }
h1,h2 { text-align:center; }
label { display:block; margin-top:10px; }
button { margin-top:10px; }
.test-nav { margin-top:20px; display:flex; justify-content:center; gap:5px; flex-wrap:wrap; }
.test-nav button { padding:5px 10px; }
.question { margin-bottom:15px; }
.options input { margin-right:5px; }
#timer { font-weight:bold; color:green; }
</style>
</head>
<body>

<h1>Padel Leraren Toets</h1>
<div>
<label>Naam: <input id="name" type="text"></label>
<label>Email: <input id="email" type="email"></label>
<label>Telefoon: <input id="phone" type="text"></label>
<label>Geboortedatum: <input id="birthdate" type="text" placeholder="dd/mm/yyyy"></label>
<label>Locatie opleiding: <input id="location" type="text"></label>
</div>

<div class="test-nav">
<!-- Buttons for Test 1 to 10 -->
<button onclick="startTest(1)">Test 1</button>
<button onclick="startTest(2)">Test 2</button>
<button onclick="startTest(3)">Test 3</button>
<button onclick="startTest(4)">Test 4</button>
<button onclick="startTest(5)">Test 5</button>
<button onclick="startTest(6)">Test 6</button>
<button onclick="startTest(7)">Test 7</button>
<button onclick="startTest(8)">Test 8</button>
<button onclick="startTest(9)">Test 9</button>
<button onclick="startTest(10)">Test 10</button>
</div>

<div>
<p>Datum & Tijd: <span id="datetime"></span></p>
<p>Timer: <span id="timer">00:00</span></p>
</div>

<div id="questions"></div>
<button onclick="submitTest()">Submit Test</button>
<button onclick="exportTXT()">Export .txt</button>
<input type="file" id="importFile" onchange="importTXT(event)">
<div id="result"></div>

<script>
// ---- DATETIME ----
function updateDateTime() {
    const now = new Date();
    const day = String(now.getDate()).padStart(2,'0');
    const month = String(now.getMonth()+1).padStart(2,'0');
    const year = now.getFullYear();
    const hours = String(now.getHours()).padStart(2,'0');
    const minutes = String(now.getMinutes()).padStart(2,'0');
    const seconds = String(now.getSeconds()).padStart(2,'0');
    document.getElementById('datetime').innerText = `${day}/${month}/${year} ${hours}:${minutes}:${seconds}`;
}
setInterval(updateDateTime, 1000);
updateDateTime();

// ---- DATE INPUT FORMAT ----
function formatDateInput(input) {
    input.addEventListener('blur', () => {
        let val = input.value.replace(/-/g,'/').replace(/\s/g,'');
        const parts = val.split('/');
        if(parts.length === 3){
            let day = parts[0].padStart(2,'0');
            let month = parts[1].padStart(2,'0');
            let year = parts[2];
            input.value = `${day}/${month}/${year}`;
        }
    });
}
formatDateInput(document.getElementById('birthdate'));

// ---- TIMER ----
let timerInterval;
let secondsElapsed = 0;
function startTimer() {
    clearInterval(timerInterval);
    secondsElapsed = 0;
    timerInterval = setInterval(() => {
        secondsElapsed++;
        let mins = String(Math.floor(secondsElapsed/60)).padStart(2,'0');
        let secs = String(secondsElapsed%60).padStart(2,'0');
        document.getElementById('timer').innerText = `${mins}:${secs}`;
        if(secondsElapsed>=3000){ clearInterval(timerInterval); submitTest(); }
    },1000);
}

// ---- TEST DATA ----
let currentTestNumber = 0;
let testData = [];
let answers = [];

function startTest(num){
    currentTestNumber = num;
    answers = [];
    document.getElementById('result').innerHTML = '';
    fetch(`https://padelstijn.github.io/padellerarentoets/padel_test${num}.json?cachebust=${Date.now()}`)
        .then(res => res.json())
        .then(data => {
            // Each JSON has key test1, test2 etc.
            const key = Object.keys(data)[0];
            testData = data[key];
            displayQuestions();
            startTimer();
        })
        .catch(err=>console.error("Error loading test:", err));
}

function displayQuestions(){
    const container = document.getElementById('questions');
    container.innerHTML = '';
    testData.forEach((q,i)=>{
        const div = document.createElement('div');
        div.className='question';
        div.innerHTML=`<p>${i+1}. ${q.question}</p>`;
        const optionsDiv = document.createElement('div');
        optionsDiv.className='options';
        q.options.forEach(opt=>{
            const id = `q${i}_${opt}`;
            optionsDiv.innerHTML+=`<label><input type="radio" name="q${i}" value="${opt}"> ${opt}</label><br>`;
        });
        div.appendChild(optionsDiv);
        container.appendChild(div);
    });
}

// ---- SUBMIT TEST ----
function submitTest(){
    clearInterval(timerInterval);
    let correctCount=0;
    let totalQuestions=testData.length;
    testData.forEach((q,i)=>{
        const selected = document.querySelector(`input[name="q${i}"]:checked`);
        answers[i] = selected ? selected.value : '';
        if(selected && selected.value === q.correct) correctCount++;
    });
    const percent = ((correctCount/totalQuestions)*100).toFixed(2);
    document.getElementById('result').innerHTML = `Resultaat: ${correctCount}/${totalQuestions} (${percent}%)`;
}

// ---- EXPORT TXT ----
function exportTXT(){
    const data = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value,
        birthdate: document.getElementById('birthdate').value,
        location: document.getElementById('location').value,
        datetime: document.getElementById('datetime').innerText,
        testNumber: currentTestNumber,
        answers: answers,
        correctAnswers: testData.map(q=>q.correct)
    };
    const blob = new Blob([JSON.stringify(data,null,2)],{type:'text/plain'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `padel_test${currentTestNumber}.txt`;
    a.click();
}

// ---- IMPORT TXT ----
function importTXT(event){
    const file = event.target.files[0];
    const reader = new FileReader();
    reader.onload = function(e){
        const data = JSON.parse(e.target.result);
        document.getElementById('name').value = data.name || '';
        document.getElementById('email').value = data.email || '';
        document.getElementById('phone').value = data.phone || '';
        document.getElementById('birthdate').value = data.birthdate || '';
        document.getElementById('location').value = data.location || '';
        if(data.testNumber) startTest(data.testNumber);
        if(data.answers) answers = data.answers;
    };
    reader.readAsText(file);
}
</script>

</body>
</html>
