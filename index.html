<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Padelleraren Toets</title>
<style>
body { font-family: Arial, sans-serif; margin:0; padding:0; display:flex; }
#sidebar { width:180px; background:#f0f0f0; padding:10px; }
#sidebar h3 { margin-top:0; }
#sidebar button { display:block; margin:5px 0; width:100%; }
#main { flex:1; padding:20px; }
.question { margin-bottom:15px; }
.answer { display:none; font-weight:bold; }
.correct { color:green; }
.incorrect { color:red; }
#timer { font-size:1.2em; font-weight:bold; color:red; }
</style>
</head>
<body>

<div id="sidebar">
<h3>Tests</h3>
<button onclick="selectTest(1)">Test 1</button>
<button onclick="selectTest(2)">Test 2</button>
<button onclick="selectTest(3)">Test 3</button>
<button onclick="selectTest(4)">Test 4</button>
<button onclick="selectTest(5)">Test 5</button>
<button onclick="selectTest(6)">Test 6</button>
<button onclick="selectTest(7)">Test 7</button>
<button onclick="selectTest(8)">Test 8</button>
<button onclick="selectTest(9)">Test 9</button>
<button onclick="selectTest(10)">Test 10</button>
<hr>
<button onclick="exportResults()">Exporteer .txt</button>
<input type="file" id="importFile" onchange="importResults(event)">
<p id="importStatus"></p>
</div>

<div id="main">
<div id="studentFormDiv">
<h2>Leerlinggegevens</h2>
<label>Naam: <input type="text" id="studentName"></label><br>
<label>E-mail: <input type="email" id="studentEmail"></label><br>
<label>Telefoon: <input type="tel" id="studentPhone"></label><br>
<label>Geboortedatum: <input type="date" id="studentDOB"></label><br>
<label>Locatie opleiding: <input type="text" id="studentLocation"></label><br>
<button onclick="startTest()">Start Test</button>
</div>

<div id="testDiv" style="display:none;">
<p>Naam: <span id="displayName"></span> | Test: <span id="displayTest"></span></p>
<p>Starttijd: <span id="startTime"></span> | Datum: <span id="currentDate"></span></p>
<p>Afteller: <span id="timer">50:00</span> <button onclick="pauseTimer()">Pauze / Hervat</button></p>
<button onclick="stopTest()">Stop en bekijk resultaat</button>
<form id="quizForm"></form>
<p id="scoreOutput" style="font-weight:bold; margin-top:20px;"></p>
</div>
</div>

<script>
let studentData = {results:[]};
let testStartTime;
let timerInterval;
let timerPaused = false;
let timeLeft = 50*60;
let currentTest = 1;
let questions = []; // hier laden we JSON

// Laad JSON van GitHub
function loadJSON(testNum){
  const url = `https://raw.githubusercontent.com/padelstijn/padellerarentoets/main/padel_test${testNum}.json`;
  fetch(url)
    .then(res => res.json())
    .then(data => {
      questions = data['test'+testNum];
      loadTest();
    })
    .catch(err => alert("Kan JSON niet laden: "+err));
}

function startTest(){
  const name = document.getElementById('studentName').value;
  const email = document.getElementById('studentEmail').value;
  const phone = document.getElementById('studentPhone').value;
  const dob = document.getElementById('studentDOB').value;
  const location = document.getElementById('studentLocation').value;
  if(!name || !email){alert("Vul minimaal naam en e-mail in");return;}
  studentData.name=name; studentData.email=email; studentData.phone=phone; studentData.dob=dob; studentData.location=location;
  testStartTime = new Date();
  document.getElementById('displayName').innerText=name;
  document.getElementById('displayTest').innerText=currentTest;
  document.getElementById('startTime').innerText=testStartTime.toLocaleTimeString();
  document.getElementById('currentDate').innerText=testStartTime.toLocaleDateString();
  document.getElementById('studentFormDiv').style.display='none';
  document.getElementById('testDiv').style.display='block';
  timeLeft=50*60;
  startClock();
  startTimer();
  loadJSON(currentTest);
}

function startClock(){ setInterval(()=>{document.getElementById('currentDate').innerText=new Date().toLocaleDateString()},1000); }
function startTimer(){
  timerInterval=setInterval(()=>{
    if(!timerPaused){
      timeLeft--;
      const m=Math.floor(timeLeft/60).toString().padStart(2,'0');
      const s=(timeLeft%60).toString().padStart(2,'0');
      document.getElementById('timer').innerText=`${m}:${s}`;
      if(timeLeft<=0) stopTest();
    }
  },1000);
}
function pauseTimer(){ timerPaused=!timerPaused; }

function loadTest(){
  const form=document.getElementById('quizForm'); form.innerHTML='';
  questions.forEach((q,i)=>{
    let div=document.createElement('div'); div.className='question'; div.dataset.qnum=i;
    let p=document.createElement('p'); p.textContent=(i+1)+". "+q.question; div.appendChild(p);
    q.options.forEach(opt=>{
      let label=document.createElement('label'); let input=document.createElement('input');
      input.type='radio'; input.name=`q${i}`; input.value=opt; label.appendChild(input); label.appendChild(document.createTextNode(opt));
      div.appendChild(label); div.appendChild(document.createElement('br'));
    });
    let span=document.createElement('span'); span.className='answer correct'; span.textContent=`Correct antwoord: ${q.correct}`;
    div.appendChild(span);
    form.appendChild(div);
  });
}

function selectTest(testNum){
  if(confirm("Weet je zeker dat je naar Test "+testNum+" wilt wisselen? Eventuele niet opgeslagen antwoorden gaan verloren.")){
    currentTest=testNum;
    timeLeft=50*60; timerPaused=false; clearInterval(timerInterval); startTimer();
    loadJSON(currentTest);
    document.getElementById('displayTest').innerText=currentTest;
  }
}

function stopTest(){
  clearInterval(timerInterval);
  const form=document.getElementById('quizForm'); 
  const questionsDiv=form.querySelectorAll('.question');
  let totalAnswered=0,totalCorrect=0;
  const endTime=new Date(); const durationSec=Math.floor((endTime-testStartTime)/1000);
  let answersData=[];
  questionsDiv.forEach((q,i)=>{
    const inputs=q.querySelectorAll('input'); let answered=false,correct=false,selected="";
    inputs.forEach(inp=>{
      const labelText=inp.nextSibling.textContent.trim();
      if(inp.checked){answered=true; selected=labelText; if(labelText==questions[i].correct) correct=true;}
    });
    if(answered){totalAnswered++; if(correct) totalCorrect++;}
    q.querySelector('.answer').style.display='inline';
    q.querySelector('.answer').classList.remove('correct','incorrect');
    q.querySelector('.answer').classList.add(correct?'correct':'incorrect');
    answersData.push({question:i+1,selected,correctAnswer:questions[i].correct,correct});
  });
  const percentage=totalAnswered>0?((totalCorrect/totalAnswered)*100).toFixed(1):0;
  const cijfer=totalAnswered>0?((totalCorrect/totalAnswered)*10).toFixed(1):0;
  studentData.results.push({testNum:currentTest,startTime:testStartTime.toLocaleString(),endTime:endTime.toLocaleString(),durationSec,totalAnswered,totalCorrect,percentage,cijfer,answers:answersData});
  document.getElementById('scoreOutput').innerHTML=`Test ${currentTest}: ${totalCorrect}/${totalAnswered} goed (${percentage}%) - Cijfer: ${cijfer}`;
}

function exportResults(){
  const blob=new Blob([JSON.stringify(studentData,null,2)],{type:"text/plain"});
  const link=document.createElement("a");
  link.href=URL.createObjectURL(blob);
  link.download=`${studentData.name}_padel_results.txt`;
  link.click();
}

function importResults(event){
  const file=event.target.files[0]; const reader=new FileReader();
  reader.onload=function(e){
    studentData=JSON.parse(e.target.result);
    document.getElementById('importStatus').innerText=`Gegevens geladen voor ${studentData.name}. Totaal ${studentData.results.length} testen aanwezig.`;
  }
  reader.readAsText(file);
}
</script>

</body>
</html>
