<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Padel Leraren Toets</title>
<style>
body { font-family: Arial, sans-serif; margin: 20px; }
h1,h2 { color: #2c3e50; }
button { margin: 5px; padding: 8px 12px; }
#testContainer { margin-top: 20px; }
.question { margin-bottom: 15px; }
.options label { margin-right: 15px; }
#timer { font-weight: bold; margin-bottom: 10px; }
</style>
</head>
<body>

<h1>Padel Leraren Toets</h1>
<div>
  <label>Naam: <input type="text" id="naam"></label>
  <label>Email: <input type="text" id="email"></label>
  <label>Tel: <input type="text" id="tel"></label>
  <label>Geboortedatum: <input type="date" id="dob"></label>
  <button id="importBtn">Import .txt</button>
</div>

<div id="testSelect">
  <h2>Selecteer Test</h2>
  <div id="testButtons"></div>
</div>

<div id="timer">Tijd: 00:00</div>
<div id="testContainer"></div>
<button id="submitBtn">Verstuur Antwoorden</button>
<button id="exportBtn">Export .txt</button>

<script>
// --- Configuratie ---
const totalTests = 10;
const baseUrl = "https://padelstijn.github.io/padellerarentoets/padel_test";

// --- State ---
let currentTestNum = 1;
let tests = [];
let timerInterval, seconds = 0;
let student = {};

// --- Timer functies ---
function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    seconds++;
    const min = String(Math.floor(seconds/60)).padStart(2,'0');
    const sec = String(seconds%60).padStart(2,'0');
    document.getElementById("timer").innerText = `Tijd: ${min}:${sec}`;
  }, 1000);
}

function pauseTimer() {
  clearInterval(timerInterval);
}

// --- Test knoppen dynamisch ---
function createTestButtons() {
  const container = document.getElementById("testButtons");
  container.innerHTML = '';
  for(let i=1;i<=totalTests;i++){
    const btn = document.createElement("button");
    btn.innerText = "Test " + i;
    btn.addEventListener("click", ()=>loadTest(i));
    container.appendChild(btn);
  }
}

// --- Laad JSON test ---
async function loadTest(testNum) {
  currentTestNum = testNum;
  seconds = 0;
  startTimer();
  const res = await fetch(`${baseUrl}${testNum}.json`);
  const data = await res.json();
  const key = Object.keys(data)[0];
  tests = data[key];
  renderTest();
}

// --- Render de test ---
function renderTest() {
  const container = document.getElementById("testContainer");
  container.innerHTML = '';
  tests.forEach((q,i)=>{
    const div = document.createElement("div");
    div.className = "question";
    div.innerHTML = `<p>${i+1}. ${q.question}</p>`;
    const opts = q.options.map(opt =>
      `<label><input type="radio" name="q${i}" value="${opt}"> ${opt}</label>`
    ).join('');
    div.innerHTML += `<div class="options">${opts}</div>`;
    container.appendChild(div);
  });
}

// --- Bereken resultaat ---
function calculateResult() {
  let score = 0;
  tests.forEach((q,i)=>{
    const opts = document.getElementsByName("q"+i);
    opts.forEach(o=>{
      if(o.checked){
        if(o.value.trim().toLowerCase() === q.correct.trim().toLowerCase()){
          score++;
        }
      }
    });
  });
  const percent = Math.round((score / tests.length) * 100);
  alert(`Score: ${score} / ${tests.length} (${percent}%)`);
  return {score, total: tests.length, percent};
}

// --- Export .txt met Nederlandse datum ---
function exportTxt() {
  const result = calculateResult();
  student = {
    naam: document.getElementById("naam").value,
    email: document.getElementById("email").value,
    tel: document.getElementById("tel").value,
    dob: document.getElementById("dob").value
  };

  // Nederlandse datum: DD-MM-YYYY
  const now = new Date();
  const dd = String(now.getDate()).padStart(2,'0');
  const mm = String(now.getMonth()+1).padStart(2,'0');
  const yyyy = now.getFullYear();
  const hh = String(now.getHours()).padStart(2,'0');
  const min = String(now.getMinutes()).padStart(2,'0');
  const ss = String(now.getSeconds()).padStart(2,'0');
  const formattedDate = `${dd}-${mm}-${yyyy} ${hh}:${min}:${ss}`;

  const data = {
    student,
    test: currentTestNum,
    result,
    timestamp: formattedDate
  };

  const blob = new Blob([JSON.stringify(data,null,2)], {type:"text/plain"});
  const link = document.createElement("a");
  link.download = `padel_test${currentTestNum}_${student.naam||'leerling'}.txt`;
  link.href = URL.createObjectURL(blob);
  link.click();
}

// --- Import .txt ---
document.getElementById("importBtn").addEventListener("click", ()=>{
  const input = document.createElement("input");
  input.type = "file";
  input.accept = ".txt";
  input.onchange = e=>{
    const file = e.target.files[0];
    const reader = new FileReader();
    reader.onload = ()=> {
      try{
        const data = JSON.parse(reader.result);
        if(data.student){
          student = data.student;
          document.getElementById("naam").value = student.naam||"";
          document.getElementById("email").value = student.email||"";
          document.getElementById("tel").value = student.tel||"";
          document.getElementById("dob").value = student.dob||"";
          alert("Studentgegevens geladen!");
        }
      }catch(err){ alert("Fout bij inladen .txt: "+err); }
    };
    reader.readAsText(file);
  };
  input.click();
});

// --- Event listeners ---
document.getElementById("submitBtn").addEventListener("click", calculateResult);
document.getElementById("exportBtn").addEventListener("click", exportTxt);

// --- Start ---
createTestButtons();
loadTest(1); // start test1 direct
</script>
</body>
</html>
