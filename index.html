<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Padel Leraren Toets</title>
<style>
body { font-family: Arial, sans-serif; margin: 20px; }
h1 { text-align: center; }
#testButtons button { margin: 2px; }
.question { margin: 10px 0; }
.options label { display: block; margin: 3px 0; }
</style>
</head>
<body>

<h1>Padel Leraren Toets</h1>

<div>
  <label>Naam: <input type="text" id="naam"></label>
  <label>Email: <input type="email" id="email"></label>
  <label>Telefoon: <input type="tel" id="tel"></label>
  <label>Geboortedatum: <input type="date" id="dob"></label>
</div>

<div id="testButtons">
  <h3>Selecteer Test:</h3>
  <button onclick="loadTest(1)">Test 1</button>
  <button onclick="loadTest(2)">Test 2</button>
  <button onclick="loadTest(3)">Test 3</button>
  <button onclick="loadTest(4)">Test 4</button>
  <button onclick="loadTest(5)">Test 5</button>
  <button onclick="loadTest(6)">Test 6</button>
  <button onclick="loadTest(7)">Test 7</button>
  <button onclick="loadTest(8)">Test 8</button>
  <button onclick="loadTest(9)">Test 9</button>
  <button onclick="loadTest(10)">Test 10</button>
</div>

<div id="timer"></div>
<div id="questions"></div>
<button onclick="calculateResult()">Bereken Resultaat</button>
<button onclick="exportTxt()">Export .txt</button>
<input type="file" id="importFile" onchange="importTxt(event)">

<script>
let tests = [];
let currentTestNum = 0;
let timerInterval;
let timeLeft = 3000; // 50 min = 3000 sec
let student = {};

function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(()=>{
    const min = Math.floor(timeLeft/60);
    const sec = timeLeft % 60;
    document.getElementById("timer").textContent = `Tijd over: ${min}:${sec.toString().padStart(2,'0')}`;
    if(timeLeft <= 0){ clearInterval(timerInterval); alert("Tijd is om!"); }
    timeLeft--;
  },1000);
}

function loadTest(num){
  currentTestNum = num;
  fetch(`padel_test${num}.json`)
    .then(resp=>resp.json())
    .then(data=>{
      tests = data[`test${num}`];
      displayQuestions();
      timeLeft = 3000; // reset timer
      startTimer();
    }).catch(e=>alert("Kon test niet laden: "+e));
}

function displayQuestions(){
  const qDiv = document.getElementById("questions");
  qDiv.innerHTML = "";
  tests.forEach((q,i)=>{
    const div = document.createElement("div");
    div.className="question";
    div.innerHTML=`<strong>${i+1}. ${q.question}</strong>`;
    const optsDiv = document.createElement("div");
    optsDiv.className="options";
    q.options.forEach(opt=>{
      const id=`q${i}_${opt}`;
      optsDiv.innerHTML += `<label><input type="radio" name="q${i}" value="${opt}"> ${opt}</label>`;
    });
    div.appendChild(optsDiv);
    qDiv.appendChild(div);
  });
}

// --- Bereken resultaat inclusief fouten ---
function calculateResult() {
  let score = 0;
  let wrong = 0;
  let unanswered = 0;
  tests.forEach((q,i)=>{
    const opts = document.getElementsByName("q"+i);
    let answered = false;
    opts.forEach(o=>{
      if(o.checked){
        answered = true;
        if(o.value.trim().toLowerCase() === q.correct.trim().toLowerCase()){
          score++;
        } else {
          wrong++;
        }
      }
    });
    if(!answered) unanswered++;
  });
  const totalAnswered = score + wrong;
  const percent = totalAnswered > 0 ? Math.round((score / totalAnswered) * 100) : 0;
  alert(`Resultaat:\nGoed: ${score}\nFout: ${wrong}\nNiet beantwoord: ${unanswered}\nPercentage goed: ${percent}%`);
  return {score, wrong, unanswered, totalAnswered, percent};
}

// --- Export .txt met NL datum DD/MM/YYYY ---
function exportTxt() {
  const result = calculateResult();
  student = {
    naam: document.getElementById("naam").value,
    email: document.getElementById("email").value,
    tel: document.getElementById("tel").value,
    dob: document.getElementById("dob").value
  };

  // Nederlandse datum: DD/MM/YYYY
  const now = new Date();
  const dd = String(now.getDate()).padStart(2,'0');
  const mm = String(now.getMonth()+1).padStart(2,'0');
  const yyyy = now.getFullYear();
  const hh = String(now.getHours()).padStart(2,'0');
  const min = String(now.getMinutes()).padStart(2,'0');
  const ss = String(now.getSeconds()).padStart(2,'0');
  const formattedDate = `${dd}/${mm}/${yyyy} ${hh}:${min}:${ss}`;

  const data = {
    student,
    test: currentTestNum,
    result,
    timestamp: formattedDate
  };

  const blob = new Blob([JSON.stringify(data,null,2)], {type:"text/plain"});
  const link = document.createElement("a");
  link.download = `padel_test${currentTestNum}_${student.naam||'leerling'}.txt`;
  link.href = URL.createObjectURL(blob);
  link.click();
}

// --- Import .txt ---
function importTxt(event){
  const file = event.target.files[0];
  const reader = new FileReader();
  reader.onload = e=>{
    try{
      const data = JSON.parse(e.target.result);
      if(data.student){
        document.getElementById("naam").value = data.student.naam || '';
        document.getElementById("email").value = data.student.email || '';
        document.getElementById("tel").value = data.student.tel || '';
        document.getElementById("dob").value = data.student.dob || '';
        if(data.test) loadTest(data.test);
        alert("Gegevens en test succesvol ingeladen!");
      }
    }catch(err){ alert("Fout bij inladen .txt: "+err); }
  };
  reader.readAsText(file);
}
</script>

</body>
</html>
